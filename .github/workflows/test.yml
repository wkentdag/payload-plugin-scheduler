name: test

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
  push:
    branches: [ main ]
env:
  PAYLOAD_SECRET: ${{secrets.PAYLOAD_SECRET}}
  DEBUG: payload-plugin-scheduler
  NODE_ENV: test
jobs:
  postgres:
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/using-containerized-services/creating-postgresql-service-containers
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
      
    env:
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/postgres
      # config path is relative to /dev (jest rootDir)
      PAYLOAD_CONFIG_PATH: "./dev/src/payload.postgres.config.ts"
    steps:
      - uses: actions/checkout@v4
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: sfw pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:postgres
  mongo:
    runs-on: ubuntu-latest
    env:
      PAYLOAD_CONFIG_PATH: "./dev/src/payload.mongo.config.ts"
    steps:
      - uses: actions/checkout@v4
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: sfw pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:mongo

    
